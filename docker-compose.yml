services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muse
      POSTGRES_PASSWORD: muse
      POSTGRES_DB: muse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rsshub:
    image: diygod/rsshub:latest
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=memory
      - CACHE_EXPIRE=600
      - TWITTER_AUTH_TOKEN=${TWITTER_AUTH_TOKEN:-}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
